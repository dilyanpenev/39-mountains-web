<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="media/appicon.png" />
    <title>39 Mountains - 39 Планини</title>
    <meta name="description" content="Log your summits across Bulgaria's 39 official mountain peaks. Track your progress, relive your climbs, and chase the complete collection." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/iconify/3.1.1/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta property="og:title" content="39 Mountains" />
    <meta property="og:description" content="Изкачи всички български планини" />
    <meta property="og:image" content="https://39mountains.quest/media/logo2.png" />
    <meta property="og:url" content="https://39mountains.quest" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <!-- NAV -->
    <nav>
    <a href="#" style="display: flex; align-items: center;">
        <img src="media/logo2.png" alt="39 Mountains" height="48" />
    </a>
    <div>
      <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
      <ul class="nav-links">
          <li><a href="#features" data-key="navFeatures"></a></li>
          <li><a href="#peaks" data-key="navPeaks"></a></li>
          <li><a href="#faq" data-key="navFaq"></a></li>
          <li><a href="#download" class="nav-cta" data-key="navDownload"></a></li>
      </ul>
    </div>
    </nav>
    

    <!-- HERO -->
    <section class="hero">
      <div class="peaks-ticker">
        <div class="peaks-ticker-track" id="tickerTrack"></div>
      </div>
    <svg class="hero-bg-rings" viewBox="0 0 1200 800" 
     preserveAspectRatio="xMidYMax slice" 
     aria-hidden="true">
  <!-- back range - faintest -->
  <path d="M-100 800 L0 480 L80 520 L180 380 L280 440 L380 300 L480 360 L560 260 L640 320 L720 240 L820 300 L900 200 L980 270 L1060 180 L1140 250 L1200 210 L1200 800 Z"
        fill="rgba(74, 124, 89, 0.06)" />

  <!-- mid range -->
  <path d="M-100 800 L0 580 L100 540 L200 480 L300 520 L400 420 L500 460 L580 360 L660 400 L760 340 L860 390 L940 300 L1020 350 L1100 290 L1200 330 L1200 800 Z"
        fill="rgba(74, 124, 89, 0.08)" />

  <!-- front range - most visible -->
  <path d="M-100 800 L0 680 L120 640 L220 600 L320 640 L420 560 L520 600 L600 520 L680 560 L780 500 L880 550 L960 480 L1040 520 L1120 470 L1200 500 L1200 800 Z"
        fill="rgba(74, 124, 89, 0.11)" />

  <!-- foreground ridge - strongest -->
  <path d="M-100 800 L0 750 L150 700 L280 720 L400 680 L500 700 L600 660 L700 690 L800 650 L920 670 L1040 630 L1200 650 L1200 800 Z"
        fill="rgba(74, 124, 89, 0.14)" />
</svg>

    <div class="hero-content reveal">
        <p class="hero-eyebrow" data-key="heroEyebrow"></p>
        <h1 class="hero-title" data-key="heroTitle"></h1>
        <p class="hero-sub" data-key="heroSub"></p>
        <div class="hero-cta-group">
        <a href="#download" class="btn-primary" id="app-store-link">
          <span class="iconify" data-icon="mdi:apple" style="font-size: 20px;"></span>
          <span data-key="heroCta"></span>
        </a>
        <button class="btn-primary btn-soon" disabled>
          <span class="iconify" data-icon="mdi:android" style="font-size: 20px;"></span>
          <span data-key="heroAndroid"></span>
        </button>
        <a href="#peaks" class="btn-ghost" data-key="heroExplore"></a>
        </div>
    </div>

    <div class="hero-scroll">
        <div class="hero-scroll-line"></div>
        <span data-key="heroScroll"></span>
    </div>
    </section>

    <!-- FEATURES -->
    <section class="section" id="features">
    <div class="section-inner">
        <p class="section-label reveal" data-key="featuresLabel"></p>
        <h2 class="section-title reveal" data-key="featuresTitle"></h2>

        <div class="features-grid">

        <div class="feature-card reveal">
            <div class="feature-icon">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <h3 data-key="feature1Title"></h3>
            <p data-key="feature1Text"></p>
        </div>

        <div class="feature-card reveal">
            <div class="feature-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <h3 data-key="feature2Title"></h3>
            <p data-key="feature2Text"></p>
        </div>

        <div class="feature-card reveal">
            <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <h3 data-key="feature3Title"></h3>
            <p data-key="feature3Text"></p>
        </div>

        </div>
    </div>
    </section>

    <!-- SCREENSHOTS -->
    <section class="screenshots-section" id="screenshots">
    <div class="section-inner">
        <p class="section-label reveal" data-key="screenshotsLabel"></p>
        <h2 class="section-title reveal" data-key="screenshotsTitle"></h2>
    </div>

    <div class="screenshots-track" id="screenshotsTrack">

        <div class="screenshot-frame">
          <img src="media/screen1.webp" alt="Dashboard screen" style="width:100%; height:100%; object-fit:cover; object-position: top;" />
          <div class="screenshot-label" data-key="screenshotDashboard"></div>
        </div>
        <div class="screenshot-frame">
          <img src="media/screen2.webp" alt="Dashboard screen" style="width:100%; height:100%; object-fit:cover; object-position: top;" />
          <div class="screenshot-label" data-key="screenshotPeaks"></div>
        </div>
        <div class="screenshot-frame">
          <img src="media/screen3.webp" alt="Dashboard screen" style="width:100%; height:100%; object-fit:cover; object-position: top;" />
          <div class="screenshot-label" data-key="screenshotMap"></div>
        </div>
        <div class="screenshot-frame">
          <img src="media/screen4.webp" alt="Dashboard screen" style="width:100%; height:100%; object-fit:cover; object-position: top;" />
          <div class="screenshot-label" data-key="screenshotProfile"></div>
        </div>
    </div>
    </section>

    <!-- PEAKS LIST -->
    <section class="section peaks-section" id="peaks">
    <div class="section-inner">
        <div class="peaks-intro">
        <div>
            <p class="section-label reveal" data-key="peaksLabel"></p>
            <h2 class="section-title reveal" style="margin-bottom: 0;" data-key="peaksTitle"></h2>
        </div>
        <div class="peaks-stat reveal">
            <div class="peaks-stat-number">2925</div>
            <div class="peaks-stat-label" data-key="peaksStatLabel"></div>
        </div>
        </div>

        <div id="peaks-container" class="peaks-grid reveal">
        </div>

        <p style="font-size: 0.8rem; color: var(--rock); margin-top: 1.25rem; text-align: right;">
        <span class="peak-difficulty diff-1" style="display:inline-block;"></span><span data-key="diffModerate"></span> &nbsp;
        <span class="peak-difficulty diff-2" style="display:inline-block;"></span><span data-key="diffChallenging"></span> &nbsp;
        <span class="peak-difficulty diff-3" style="display:inline-block;"></span><span data-key="diffDemanding"></span>
        </p>
    </div>
    </section>

    <!-- FAQ -->
    <section class="section faq-section" id="faq">
    <div class="section-inner">
        <p class="section-label reveal" data-key="faqLabel"></p>
        <h2 class="section-title reveal" data-key="faqTitle"></h2>

        <div class="faq-list reveal">

        <div class="faq-item">
            <button class="faq-question">
                <span data-key="faq1Q"></span>
                <svg class="faq-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="faq-answer" data-key="faq1A"></div>
        </div>

        <div class="faq-item">
            <button class="faq-question">
                <span data-key="faq3Q"></span>
                <svg class="faq-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="faq-answer" data-key="faq3A"></div>
        </div>

        <div class="faq-item">
            <button class="faq-question">
                <span data-key="faq4Q"></span>
                <svg class="faq-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="faq-answer" data-key="faq4A"></div>
        </div>

        <div class="faq-item">
            <button class="faq-question">
                <span data-key="faq5Q"></span>
                <svg class="faq-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="faq-answer" data-key="faq5A"></div>
        </div>

        </div>
    </div>
    </section>

    <!-- CTA FOOTER -->
    <section class="cta-footer" id="download">
    <p class="section-label" data-key="ctaLabel"></p>
    <h2 data-key="ctaTitle"></h2>
    <p data-key="ctaSub"></p>
    <div class="hero-cta-group">
        <a href="https://apps.apple.com/bg/app/39-mountains/id6774664083" class="btn-primary" id="app-store-link">
          <span class="iconify" data-icon="mdi:apple" style="font-size: 20px;"></span>
          <span data-key="heroCta"></span>
        </a>
        <button class="btn-primary btn-soon" disabled>
          <span class="iconify" data-icon="mdi:android" style="font-size: 20px;"></span>
          <span data-key="heroAndroid"></span>
        </button>
    </div>
    <div class="footer-links">
        <a href="https://docs.google.com/document/d/1o0_IEDqUh6XP5tS_LcPOWn713-qWYF818VTPr0v_C6s" data-key="footerPrivacy"></a>
        <!-- <a href="/support" data-key="footerSupport"></a> -->
        <a href="mailto:support@39mountains.quest" data-key="footerContact"></a>
        <span style="color: rgba(232,224,208,0.2);" data-key="footerCopy"></span>
    </div>
    </section>
    <script src="translation.js"></script>
    <script src="script.js"></script>
  </body>
</html>
